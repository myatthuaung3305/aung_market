{% extends 'base.html' %}
{% block content %}
<section class="section">
  <h1><i class="fa-solid fa-user" style="color: var(--accent)"></i> My Profile</h1>
  <div class="panel">
    <form method="post" action="{{ url_for('profile_update') }}" class="form-grid">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" value="{{ user.name }}" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ user.email }}" required>

      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone" value="{{ user.phone }}" required>

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" required>{{ user.address }}</textarea>

      <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk"></i> Update Profile</button>
    </form>
  </div>
</section>

<section class="section">
  <h2><i class="fa-solid fa-key" style="color: var(--accent)"></i> Change Password</h2>
  <div class="panel">
    <form method="post" action="{{ url_for('profile_password_update') }}" class="form-grid">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required>

      <label for="password">New Password</label>
      <input type="password" id="password" name="password" required>

      <label for="password_confirmation">Confirm New Password</label>
      <input type="password" name="password_confirmation" required>

      <button type="submit" class="btn"><i class="fa-solid fa-shield"></i> Update Password</button>
    </form>
  </div>
</section>
{% endblock %}
