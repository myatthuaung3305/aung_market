{% extends 'base.html' %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Login</h1>
    <p>Welcome back to Aung Market.</p>
    <form method="post" action="{{ url_for('login_attempt') }}" class="form-grid">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>

    <p class="small-muted" style="margin-top:10px">
      Don’t have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>

  </div>
</section>
{% endblock %}
